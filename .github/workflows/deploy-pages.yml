name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# A new publish supersedes any in-flight deploy instead of queueing behind it,
# so a wedged run can never block the next edition from going live.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://livingston.github.io/Intellectus/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      # GitHub's Pages backend intermittently returns "Deployment failed, try
      # again later." for a perfectly healthy artifact. Retry with backoff so a
      # transient blip doesn't leave the site stale until the next cron publish.
      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (retry 1)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (retry 2)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
